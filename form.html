<div class="container">
    <h1>Add New Interest</h1>
    <form>
        <div class="form-group">
            <label for="interestName">Interest Name</label>
            <input type="text" class="form-control" id="interestDescription" placeholder="Name">
        </div>
        <div class="form-group">
            <label for="interestText">Interest Description</label>
            <input type="text" class="form-control" id="interestDescription" style="height:120px";>
        </div>

        <div class="form-row">
            <div class="col">
                <p>Upload Local Image:</p>
                <input type="file" id="myFile" name="filename2">
            </div>
            <div class="col">
                <label for="sel1">Select # of Tweets to Display:</label>
                 <select class="form-control" id="sel1">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                </select>
            </div>
        </div>
        <br>

        <p>On a scale of 1-5, how interested in this are you?</p>
        <div class="form-group row">
            <div class="col-sm-10">
                <div class="form-check form-check-inline">
                    <input type="radio" class="form-check-input" name="genderadios" id="rdbmale" value="male" checked>
                    <label class="form-check-label" for="gridRadios1">1</label>
                </div>
                <div class="form-check form-check-inline">
                    <input type="radio" class="form-check-input" name="genderadios" id="rdbfemale" value="female">
                    <label class="form-check-label" for="gridRadios2">2</label>
                </div>
                <div class="form-check form-check-inline">
                    <input type="radio" class="form-check-input" name="genderadios" id="rdbfemale" value="female">
                    <label class="form-check-label" for="gridRadios2">3</label>
                </div>
                <div class="form-check form-check-inline">
                    <input type="radio" class="form-check-input" name="genderadios" id="rdbfemale" value="female">
                    <label class="form-check-label" for="gridRadios2">4</label>
                </div>
                <div class="form-check form-check-inline">
                    <input type="radio" class="form-check-input" name="genderadios" id="rdbfemale" value="female">
                    <label class="form-check-label" for="gridRadios2">5</label>
                </div>
            </div>
        </div>

        <p>Login to Finish Submiting</p>
        <div class="form-row">
            <div class="col">
                <input type="text" class="form-control" id="interestDescription" placeholder="Username">
            </div>
            <div class="col">
                <input type="password" class="form-control" id="interestDescription" placeholder="Password">
            </div>
        </div>

        <br>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>
